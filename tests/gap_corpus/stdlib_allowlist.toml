[[case]]
name = "stdlib-builtins-sys-breakpoint-hook"
scope = "stdlib-sandbox"
category = "runtime-semantic"
root_cause = "builtins-sys-breakpoint-hook"
modules = ["builtins", "sys"]
priority = "should_fix"
source = '''
import builtins, sys
def hook(*args, **kwargs):
    print("hook", args, sorted(kwargs.items()))
    return "ret"
saved = sys.breakpointhook
sys.breakpointhook = hook
try:
    print(hasattr(builtins, "breakpoint"), hasattr(sys, "__breakpointhook__"), sys.breakpointhook is hook)
    print(breakpoint(1, "x", key=3))
finally:
    sys.breakpointhook = saved
'''

[[case]]
name = "stdlib-collections-copy-io-array"
scope = "stdlib-sandbox"
category = "runtime-semantic"
root_cause = "collections-copy-io-array-core"
modules = ["collections", "collections.abc", "copy", "io.BytesIO", "array"]
priority = "should_fix"
source = '''
import collections, collections.abc, copy, io, array
counter = collections.Counter('ababa')
print(counter['a'], counter.most_common(1))
print(isinstance([], collections.abc.Sequence), isinstance({}, collections.abc.Mapping))
data = {'items': [1]}
clone = copy.copy(data)
clone['items'].append(2)
print(data['items'])
bio = io.BytesIO()
print(bio.write(b'xy'), bio.getvalue())
print(array.array('B', bio.getvalue()).tolist())
'''
