[[case]]
name = "syntax-function-closure"
scope = "syntax"
category = "syntax"
root_cause = "syntax-frontend-functions"
modules = ["syntax"]
priority = "must_fix"
source = '''
def make(offset):
    def inner(value):
        return value + offset
    return inner
print(make(4)(5))
'''

[[case]]
name = "syntax-class-method"
scope = "syntax"
category = "syntax"
root_cause = "syntax-frontend-classes"
modules = ["syntax"]
priority = "must_fix"
source = '''
class Counter:
    def __init__(self, value):
        self.value = value
    def inc(self):
        self.value += 1
        return self.value
print(Counter(2).inc())
'''

