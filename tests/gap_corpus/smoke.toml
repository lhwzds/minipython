[[case]]
name = "syntax-function-closure"
scope = "syntax"
priority = "must_fix"
source = '''
def make(offset):
    def inner(value):
        return value + offset
    return inner
print(make(4)(5))
'''

[[case]]
name = "syntax-class-method"
scope = "syntax"
priority = "must_fix"
source = '''
class Counter:
    def __init__(self, value):
        self.value = value
    def inc(self):
        self.value += 1
        return self.value
print(Counter(2).inc())
'''

[[case]]
name = "syntax-match-basic"
scope = "syntax"
priority = "must_fix"
source = '''
value = ("ok", 3)
match value:
    case ("ok", n):
        print(n)
    case _:
        print("fallback")
'''

