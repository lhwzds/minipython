[[case]]
name = "json-loads-number-hooks"
scope = "stdlib-sandbox"
category = "runtime-semantic"
root_cause = "json-loads-number-hooks"
modules = ["json"]
priority = "should_fix"
source = '''
import json
calls = []
def pint(text):
    calls.append(('int', text))
    return ['int', text]
def pfloat(text):
    calls.append(('float', text))
    return ['float', text]
def pconst(text):
    calls.append(('const', text))
    return ['const', text]
print(json.loads('[1, -2, 3.5, NaN]', parse_int=pint, parse_float=pfloat, parse_constant=pconst))
print(calls)
'''

[[case]]
name = "json-loads-object-hooks"
scope = "stdlib-sandbox"
category = "runtime-semantic"
root_cause = "json-loads-object-hooks"
modules = ["json"]
priority = "should_fix"
source = '''
import json
def hook(value):
    return {'keys': sorted(value)}
def pairs(value):
    return [('pairs', value)]
print(json.loads('{"b": 1, "a": {"c": 2}}', object_hook=hook))
print(json.loads('{"a": 1, "a": 2}', object_pairs_hook=pairs))
'''

