[[case]]
name = "json-dumps-nonfinite-and-circular"
scope = "stdlib-sandbox"
category = "runtime-semantic"
root_cause = "json-dumps-nonfinite-and-circular"
modules = ["json"]
priority = "should_fix"
source = '''
import json
for value in [float('nan'), float('inf'), float('-inf')]:
    print(json.dumps(value))
    try:
        print(json.dumps(value, allow_nan=False))
    except Exception as error:
        print(type(error).__name__, str(error))
value = []
value.append(value)
try:
    print(json.dumps(value, check_circular=True))
except Exception as error:
    print(type(error).__name__, str(error))
'''

[[case]]
name = "json-file-api-out-of-scope"
scope = "stdlib-sandbox"
category = "stdlib-missing"
root_cause = "json-file-api-out-of-scope"
modules = ["json"]
priority = "wont_fix"
expected = "unsupported_out_of_scope"
source = '''
import json
class Sink:
    def __init__(self):
        self.parts = []
    def write(self, text):
        self.parts.append(text)
        return len(text)
class Source:
    def read(self):
        return '{"a": 1}'
sink = Sink()
json.dump({'a': 1}, sink, sort_keys=True)
print('dumped', ''.join(sink.parts))
print('loaded', json.load(Source()))
'''

