modules = ["json"]
priority = "should_fix"
source = '''
import json
calls = []
def pint(text):
    calls.append(('int', text))
    return ['int', text]
def pfloat(text):
    calls.append(('float', text))
    return ['float', text]
def pconst(text):
    calls.append(('const', text))
    return ['const', text]
print(json.loads('[1, -2, 3.5, NaN]', parse_int=pint, parse_float=pfloat, parse_constant=pconst))
